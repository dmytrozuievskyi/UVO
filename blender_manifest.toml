name = "UVO"
version = "1.0.0"
tagline = "Dynamic overlays for the UV Editor"
maintainer = "Dmytro Zuievskyi"
blender_version_min = "4.2.0"

description = """Enhance your UV workflow with a suite of dynamic overlays.

• ID Overlay: Instantly assign distinct, stable colors to each object or mesh component, with Object and Island color modes.
• Intersect Overlay: Clearly highlight overlapping and stacked islands in real-time, checking within objects and across all objects in Edit Mode. Supports both Tiled and UDIM workflows.
• Padding Overlay: Visualize per-island padding zones and instantly spot islands whose padding areas overlap, helping you catch potential mipmap bleed before it becomes a problem."""

